<!DOCTYPE html>
<html>
<head>
    <title>DevOps Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>

    /* ===== GLOBAL ===== */
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
    }

    /* ===== TOP BAR ===== */
    .topbar {
        height: 50px;
        background: #111827;
        color: white;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 20px;
    }

    .topbar a {
        color: white;
        margin-left: 20px;
        text-decoration: none;
    }

    /* ===== LAYOUT ===== */
    .main-container {
        display: flex;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
        width: 250px;
        background: #1e293b;
        height: 100vh;
        padding: 15px;
        flex-shrink: 0;
    }

    /* ===== MENU ===== */
    .menu-item {
        display: block;
        padding: 10px;
        margin-bottom: 5px;
        color: #cbd5f5;
        text-decoration: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .menu-item:hover {
        background: #334155;
        color: white;
        transform: translateX(5px);
    }

    .menu-item i {
        margin-right: 8px;
    }

    /* ===== ACTIVE ===== */
    .active {
        background: #2563eb;
        color: white;
    }

    /* ===== SUBMENU ===== */
    .submenu {
        margin-left: 10px;
        max-height: 0;
        opacity: 0;
        overflow: hidden;
        transition: max-height 0.4s ease, opacity 0.3s ease;
    }

    .submenu.open {
        max-height: 500px;
        opacity: 1;
    }

    .arrow {
        float: right;
    }

    /* ===== CONTENT ===== */
    .content {
        flex: 1;
        padding: 20px;
    }

    /* ===== CARDS ===== */
    .card {
        background: #1e293b;
        color: white;
        border-radius: 12px;
        transition: transform 0.2s ease;
    }

    .card:hover {
        transform: scale(1.05);
    }

.breadcrumb {
    background: transparent;
    padding: 0;
    margin-bottom: 15px;
}

.breadcrumb-item a {
    color: #93c5fd;
    text-decoration: none;
}

.breadcrumb-item.active {
    color: #e2e8f0;
}

    </style>
</head>

<body>

<!-- ===== TOP BAR ===== -->
<div class="topbar">
    <a href="/resume">Resume</a>
    <a href="/settings">Settings</a>
</div>

<div class="main-container">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">

        <h4 class="text-white mb-4">🚀 Portal</h4>

        <!-- Dashboard -->
        <a href="/" class="menu-item {% if request.path == '/' %}active{% endif %}">
            <i class="fa fa-home"></i> Dashboard
        </a>

        <!-- Skills -->
        <div class="menu-item" onclick="toggleMenu(event, 'skills')">
            <i class="fa fa-code"></i> Skills <span class="arrow">▼</span>
        </div>

        <div id="skills"
             class="submenu {% if request.path.startswith('/skills') %}open{% endif %}">

            <!-- DevOps -->
            <div class="menu-item" onclick="toggleMenu(event, 'devops')">
                🔧 DevOps <span class="arrow">▼</span>
            </div>

            <div id="devops"
     class="submenu {% if request.path.startswith('/skills/devops') %}open{% endif %}">

    {% for t in tools %}
    <a href="/skills/devops/{{ t.slug }}"
       class="menu-item {% if tool == t.slug %}active{% endif %}">
        {{ t.name }}
    </a>
    {% endfor %}

</div>

            <a href="#" class="menu-item">🐍 Python</a>
            <a href="#" class="menu-item">☕ Java</a>

        </div>

    </div>

    <!-- ===== CONTENT ===== -->
<div class="content">

    <!-- Page Header -->
    <div class="mb-4">
        <h2>{% block page_title %}Title{% endblock %}</h2>
        <p class="text-muted">{% block page_subtitle %}{% endblock %}</p>
    </div>
    <!-- Breadcrumb -->
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">

        {% block breadcrumb %}
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        {% endblock %}

    </ol>
</nav>

    <!-- Page Content -->
    <div>
        {% block content %}{% endblock %}
    </div>

</div>

</div>

<!-- ===== JS (BOTTOM ONLY) ===== -->

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
    AOS.init({
        duration: 800,
        once: true
    });

    function toggleMenu(event, id) {
        event.stopPropagation();

        const menu = document.getElementById(id);
        if (!menu) return;

        menu.classList.toggle('open');
    }
</script>

</body>
</html>
