apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-portal-deployment
  labels:
    app: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
      - name: devops-portal
        image: shyamfree13/devops-portal:25
        ports:
        - containerPort: 5000
